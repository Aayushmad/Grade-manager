version: 2.1

jobs:
  build_and_test:
    docker:
      - image: cimg/python:3.11

    steps:
      - checkout

      - run:
          name: Upgrade pip
          command: python -m pip install --upgrade pip

      - run:
          name: Install dependencies
          command: |
            pip install -r requirements.txt

      - run:
          name: Run pytest
          command: |
            pytest -v

workflows:
  version: 2
  test_workflow:
    jobs:
      - build_and_test